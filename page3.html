<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memory Lane 📸</title>
<link rel="stylesheet" href="style.css" />

<style>
.page3-layout {
  max-width: 900px;
  margin: 0 auto;
  padding: 5rem 1.5rem 6rem;
}

/* ✅ PERFECT 3-PHOTO GRID */
.gallery-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

/* BIG HERO IMAGE */
.gallery-item:first-child {
  aspect-ratio: 16 / 9;
}

/* SMALL IMAGES */
.gallery-item:nth-child(2),
.gallery-item:nth-child(3) {
  aspect-ratio: 1 / 1;
}

/* RESPONSIVE */
@media (min-width: 500px) {
  .gallery-grid {
    grid-template-columns: 1fr 1fr;
  }

  .gallery-item:first-child {
    grid-column: span 2;
    aspect-ratio: 16 / 9;
  }
}

/* IMAGE STYLE */
.gallery-item {
  overflow: hidden;
  border-radius: 16px;
}

.gallery-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

/* HOVER EFFECT (PREMIUM TOUCH) */
.gallery-item:hover .gallery-img {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="page3-layout">

  <!-- HEADER -->
  <div class="page3-header fade-up">
    <span class="intro-label">✦ memories that matter ✦</span>

    <h1 class="serif-title">
      Memory Lane <span class="rose-text">📸</span>
    </h1>

    <p class="serif-italic" style="margin-top:0.5rem">
      Moments that matter ✨
    </p>

    <div class="glow-divider"></div>
  </div>

  <!-- 🎯 GALLERY -->
  <div class="gallery-grid">

    <!-- BIG IMAGE -->
    <div class="gallery-item" data-caption="That smile ✨">
      <img src="images/1.png" class="gallery-img">
    </div>

    <!-- SMALL LEFT -->
    <div class="gallery-item" data-caption="Golden moment 🌅">
      <img src="images/2.jpeg" class="gallery-img">
    </div>

    <!-- SMALL RIGHT -->
    <div class="gallery-item" data-caption="Pure joy 😄">
      <img src="images/3.jpeg" class="gallery-img">
    </div>

  </div>

  <!-- NAV -->
  <div class="nav-btns fade-up">
    <a href="page2.html" class="btn btn-ghost">← Back</a>
    <a href="page4.html" class="btn btn-primary">Final Surprise →</a>
  </div>

</div>

</body>
</html>
